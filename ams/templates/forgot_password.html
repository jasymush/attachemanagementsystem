{% extends "base.html" %}

{% block title %}Forgot Password{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 col-lg-5">
        <div class="card p-4 shadow-lg rounded-4">
            <div class="card-body">
                <h2 class="card-title text-center mb-4 fw-bold text-success">Forgot Your Password?</h2>
                <p class="text-center text-muted mb-4">Enter your email address below and we'll send you a link to reset your password.</p>
                <form method="POST" action="{{ url_for('auth.forgot_password') }}">
                    <div class="mb-3">
                        <label for="email" class="form-label">Email address</label>
                        <input type="email" class="form-control rounded-pill" id="email" name="email" required>
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg rounded-pill">Send Reset Link</button>
                    </div>
                </form>
                <div class="text-center mt-3">
                    <p><a href="{{ url_for('auth.login') }}" class="text-success fw-bold">Back to Login</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
