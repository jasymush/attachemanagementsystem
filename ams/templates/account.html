{% extends "base.html" %}

{% block title %}Account Details{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-8 col-lg-7">
        <div class="card p-4 shadow-lg rounded-4">
            <h2 class="card-title text-center mb-4 fw-bold text-success">Edit Account Details</h2>
            <form method="POST" action="{{ url_for('main.account') }}">
                <div class="mb-3">
                    <label for="full_name" class="form-label">Full Name</label>
                    <input type="text" class="form-control rounded-pill" id="full_name" name="full_name" value="{{ user.full_name }}" required>
                </div>
                <div class="mb-3">
                    <label for="phone_number" class="form-label">Phone Number</label>
                    <input type="tel" class="form-control rounded-pill" id="phone_number" name="phone_number" value="{{ user.phone_number }}" required>
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label">Email address</label>
                    <input type="email" class="form-control rounded-pill" id="email" name="email" value="{{ user.email }}" required>
                </div>
                <div class="mb-3">
                    <label for="institution" class="form-label">Institution</label>
                    <input type="text" class="form-control rounded-pill" id="institution" name="institution" value="{{ user.institution }}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Role</label>
                    <input type="text" class="form-control rounded-pill" value="{{ user.role }}" readonly disabled>
                    <small class="form-text text-muted">Your role cannot be changed here. Contact an administrator.</small>
                </div>
                <div class="mb-3">
                    <label class="form-label">Department</label>
                    <input type="text" class="form-control rounded-pill" value="{{ user.department }}" readonly disabled>
                    <small class="form-text text-muted">Your department cannot be changed here. Contact an administrator.</small>
                </div>
                <div class="mb-3">
                    <label class="form-label d-block">Ministry Rating (1-5 stars)</label>
                    <div class="rating-stars">
                        <input type="radio" id="star5" name="ministry_rating" value="5" {% if user.ministry_rating == 5 %}checked{% endif %}><label for="star5" title="5 stars">&#9733;</label>
                        <input type="radio" id="star4" name="ministry_rating" value="4" {% if user.ministry_rating == 4 %}checked{% endif %}><label for="star4" title="4 stars">&#9733;</label>
                        <input type="radio" id="star3" name="ministry_rating" value="3" {% if user.ministry_rating == 3 %}checked{% endif %}><label for="star3" title="3 stars">&#9733;</label>
                        <input type="radio" id="star2" name="ministry_rating" value="2" {% if user.ministry_rating == 2 %}checked{% endif %}><label for="star2" title="2 stars">&#9733;</label>
                        <input type="radio" id="star1" name="ministry_rating" value="1" {% if user.ministry_rating == 1 %}checked{% endif %}><label for="star1" title="1 star">&#9733;</label>
                    </div>
                </div>
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary btn-lg rounded-pill">Update Details</button>
                </div>
            </form>
            <div class="text-center mt-4">
                <a href="{{ url_for('main.dashboard') }}" class="btn btn-outline-success rounded-pill px-4">
                    <i class="fas fa-arrow-left me-1"></i> Back to Dashboard
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
