{% extends "base.html" %}

{% block title %}Submit Report{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-8">
        <div class="card p-4 shadow-lg rounded-4">
            <h2 class="card-title text-center mb-4 fw-bold text-success">Submit Your Report</h2>
            <form method="POST" action="{{ url_for('main.submit_report') }}">
                <div class="mb-3">
                    <label for="report_type" class="form-label">Report Type</label>
                    <select class="form-select rounded-pill" id="report_type" name="report_type" required onchange="toggleReportFields()">
                        <option value="" disabled selected>Select report type...</option>
                        <option value="absent_days">Days Absent</option>
                        <option value="complaint">Complaint</option>
                        <option value="recommendation">Recommendation</option>
                    </select>
                </div>

                <div id="absentDaysFields" style="display: none;">
                    <div class="mb-3">
                        <label for="start_date" class="form-label">Start Date</label>
                        <input type="date" class="form-control rounded-pill" id="start_date" name="start_date">
                    </div>
                    <div class="mb-3">
                        <label for="end_date" class="form-label">End Date</label>
                        <input type="date" class="form-control rounded-pill" id="end_date" name="end_date">
                    </div>
                    <div class="mb-3">
                        <label for="reason" class="form-label">Reason for Absence</label>
                        <textarea class="form-control rounded-3" id="reason" name="reason" rows="3"></textarea>
                    </div>
                </div>

                <div id="complaintRecommendationFields" style="display: none;">
                    <div class="mb-3">
                        <label for="subject" class="form-label">Subject</label>
                        <input type="text" class="form-control rounded-pill" id="subject" name="subject">
                    </div>
                </div>

                <div class="mb-3">
                    <label for="details" class="form-label">Details</label>
                    <textarea class="form-control rounded-3" id="details" name="details" rows="5" required></textarea>
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary btn-lg rounded-pill">Submit Report</button>
                </div>
            </form>
            <div class="text-center mt-4">
                <a href="{{ url_for('main.dashboard') }}" class="btn btn-outline-success rounded-pill px-4">
                    <i class="fas fa-arrow-left me-1"></i> Back to Dashboard
                </a>
            </div>
        </div>
    </div>
</div>

<script>
    function toggleReportFields() {
        const reportType = document.getElementById('report_type').value;
        const absentDaysFields = document.getElementById('absentDaysFields');
        const complaintRecommendationFields = document.getElementById('complaintRecommendationFields');

        absentDaysFields.style.display = 'none';
        complaintRecommendationFields.style.display = 'none';

        // Reset required attributes
        absentDaysFields.querySelectorAll('input, textarea').forEach(el => el.removeAttribute('required'));
        complaintRecommendationFields.querySelectorAll('input').forEach(el => el.removeAttribute('required'));

        if (reportType === 'absent_days') {
            absentDaysFields.style.display = 'block';
            absentDaysFields.querySelectorAll('input, textarea').forEach(el => el.setAttribute('required', 'required'));
        } else if (reportType === 'complaint' || reportType === 'recommendation') {
            complaintRecommendationFields.style.display = 'block';
            complaintRecommendationFields.querySelectorAll('input').forEach(el => el.setAttribute('required', 'required'));
        }
    }
</script>
{% endblock %}
