{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 col-lg-5">
        <div class="card p-4 shadow-lg rounded-4">
            <div class="card-body">
                <h2 class="card-title text-center mb-4 fw-bold text-success">Login to AMS</h2>
                <form method="POST" action="{{ url_for('auth.login') }}">
                    <div class="mb-3">
                        <label for="email" class="form-label">Email address</label>
                        <input type="email" class="form-control rounded-pill" id="email" name="email" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control rounded-pill" id="password" name="password" required>
                    </div>
                    <div class="mb-3">
                        <label for="role" class="form-label">Select Role</label>
                        <select class="form-select rounded-pill" id="role" name="role" required>
                            <option value="" disabled selected>Choose your role...</option>
                            <option value="Attachee">Attachee</option>
                            <option value="Supervisor">Supervisor</option>
                            <option value="Director">Director</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="department" class="form-label">Select Department</label>
                        <select class="form-select rounded-pill" id="department" name="department" required>
                            <option value="" disabled selected>Choose your department...</option>
                            <option value="ICT">ICT</option>
                            <option value="Finance">Finance</option>
                            <option value="Planning">Planning</option>
                            <option value="Human Resource">Human Resource</option>
                        </select>
                    </div>
                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="remember_me" name="remember_me">
                        <label class="form-check-label" for="remember_me">Remember me</label>
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg rounded-pill">Login</button>
                    </div>
                </form>
                <div class="text-center mt-3">
                    <p>Don't have an account? <a href="{{ url_for('auth.signup') }}" class="text-success fw-bold">Sign Up</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
